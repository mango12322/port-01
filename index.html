<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>여행사이트</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="banner">
          <div class="lnb">
            <a href="#none"><em>for</em> member</a>
            <a href="#none"><em>for</em> clients</a>
            <a href="#none"><em>for</em> inquire</a>
          </div>
        </div>
        <nav class="nav">
          <div class="logo">
            <a href="#none">
              <span class="material-symbols-outlined"> travel </span>
              <h1>Travel</h1>
            </a>
          </div>
          <ul class="gnb">
            <li><a href="#none">HOME</a></li>
            <li><a href="#none">ABOUT</a></li>
            <li><a href="#none">LANKING</a></li>
            <li><a href="#none">TESTIMONIAL</a></li>
            <li><a href="#none">BLOG</a></li>
          </ul>
        </nav>
      </header>
      <main class="intro">
        <div class="inner">
          <div class="heading">
            <h1>The World's Best Cities</h1>
            <p>
              It's not just about good weather or grea food and nightlife.
              Unlike other best-of lists, Resonance's annual ranking also
              considers a city's diversity.
            </p>
          </div>
        </div>
      </main>
      <section class="about">
        <div class="inner"></div>
      </section>
      <section class="ranking">
        <div class="inner"></div>
      </section>
      <section class="testimonial">
        <div class="inner"></div>
      </section>
      <section class="callaction">
        <div class="inner"></div>
      </section>
      <section class="blog">
        <div class="inner"></div>
      </section>
      <section class="festival">
        <div class="inner"></div>
      </section>
      <footer class="footer">
        <div class="inner"></div>
      </footer>
    </div>

    <!-- 
      1280px ~ 1560px
      .inner (섹션 안쪽의 그룹핑) 1300px, margin: auto
    -->
  </body>
</html>
